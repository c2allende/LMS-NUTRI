<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actividad | LMS Academia ND PR</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Lora:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css">
    <style>
        :root {
            --font-ui:      "DM Sans", system-ui, sans-serif;
            --font-reading: "Lora", Georgia, serif;
        }
        body { font-family: var(--font-ui); }
        h1, h2, h3, .card-title { font-family: var(--font-reading); }
        .reading-content, .prose { font-family: var(--font-reading); font-size: 17px; line-height: 1.7; }
        .reading-content h1, .reading-content h2, .reading-content h3, .prose h1, .prose h2, .prose h3 { font-family: var(--font-reading); }
        .lesson-header h1, .page-title { font-family: var(--font-reading); line-height: 1.25; }
    </style>
    <script type="module" src="scripts/auth-guard.js"></script>
</head>
<body>
    <div class="app-shell">
        <!-- Sidebar Navigation -->
        <aside class="sidebar" id="lms-sidebar">
            <a href="dashboard.html" class="sidebar-brand">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40" class="sidebar-logo" aria-label="Academia ND PR" role="img"><circle cx="20" cy="20" r="19" fill="white" fill-opacity="0.15"/><text x="20" y="25" text-anchor="middle" font-family="DM Sans, sans-serif" font-size="12" font-weight="700" fill="white">AND</text><text x="20" y="35" text-anchor="middle" font-family="DM Sans, sans-serif" font-size="7" fill="rgba(255,255,255,0.75)">PR</text></svg>
            </a>

            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-link">
                    <span class="icon">🏠</span>
                    <span>Dashboard</span>
                </a>

                <div class="meta-label p-4 mb-0" style="padding: var(--space-4) var(--space-4) 0; font-size: var(--text-xs); color: var(--color-text-faint);">Módulo Actual</div>
                <a href="modulo1_intro.html" class="nav-link is-active">
                    <span class="icon">📘</span>
                    <span>Módulo 1</span>
                </a>

                <hr class="mt-4 mb-4">
                <a href="perfil.html" class="nav-link">
                    <span class="icon">👤</span>
                    <span>Mi Perfil</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="sidebar-user">
                    <div class="avatar avatar-sm">U</div>
                    <div class="user-info">
                        <div class="text-sm weight-bold" style="font-weight: var(--weight-bold);">Estudiante</div>
                        <div class="text-xs text-muted">Online</div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- Topbar -->
            <header class="topbar">
                <button class="mobile-menu-button btn btn-ghost btn-icon" aria-label="Abrir menú de navegación" aria-controls="lms-sidebar" aria-expanded="false">
                    <span style="font-size: 24px;">☰</span>
                </button>
                <div class="topbar-title">Actividad [X.X]: [TÍTULO]</div>
                <div class="topbar-actions">
                    <div class="cluster">
                        <span class="badge badge-warning">Evaluación</span>
                    </div>
                </div>
            </header>

            <!-- Page Content -->
            <div class="page-wrapper">
                <div class="lesson-layout">
                    <div class="lesson-content">
                        <!-- Activity Header -->
                        <header class="lesson-header mb-8">
                            <span class="eyebrow">Actividad de Refuerzo</span>
                            <h1 class="page-title">[TÍTULO DE LA ACTIVIDAD]</h1>
                        </header>

                        <!-- Instructions -->
                        <div class="instruction-box">
                            <h2 class="weight-bold">Instrucciones</h2>
                            <p>[DESCRIBE LOS PASOS DE LA ACTIVIDAD AQUÍ]</p>
                        </div>

                        <!-- Submission Form -->
                        <section class="section">
                            <div class="form-group">
                                <label class="form-label">Tu Entrega</label>
                                <textarea class="textarea" rows="8" placeholder="Escribe tu respuesta aquí..."></textarea>
                            </div>
                            <div class="split mt-6" style="margin-top: var(--space-6);">
                                <div></div>
                                <button type="button" class="btn btn-primary">Enviar Actividad</button>
                            </div>
                        </section>

                        <!-- Navigation Footer -->
                        <footer class="lesson-nav mt-12 pt-8" style="margin-top: var(--space-12); padding-top: var(--space-8); border-top: 1px solid var(--color-border);">
                            <div class="split">
                                <!-- TODO: enlace dinámico a la lección de origen -->
                                <a href="#" class="btn btn-outline">
                                    <span>← Volver a la Lección</span>
                                </a>
                                <!-- TODO: enlace al foro del módulo -->
                                <a href="#" class="btn btn-ghost">
                                    <span>Ir al Foro →</span>
                                </a>
                            </div>
                        </footer>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="scripts/firebase-config.js"></script>
    <script src="scripts/ui-controller.js"></script>
</body>
</html>
